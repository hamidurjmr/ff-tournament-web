<title>Free Fire Tournament App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */
header{
padding:15px;
font-size:20px;
background:#020617;
border-bottom:1px solid #222;
animation:fadeDown 1s ease;
}

/* HERO */
.hero{
padding:80px 20px;
animation:fadeUp 1s ease;
}

.hero img{
width:120px;
border-radius:20px;
animation:float 3s infinite;
}

.hero h1{
margin-top:20px;
font-size:36px;
}

/* BUTTON */
.download-btn{
display:inline-block;
margin-top:30px;
padding:15px 40px;
background:#22c55e;
border-radius:10px;
font-size:18px;
cursor:pointer;
animation:pulse 2s infinite;
}

.download-btn:hover{
transform:scale(1.1);
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.3s;
animation:fadeUp 1s ease;
}

.card:hover{
transform:translateY(-10px);
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.loader-bar{
width:200px;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.loader-fill{
width:0%;
height:100%;
background:#22c55e;
animation:load 3s forwards;
}

/* ANIMATIONS */
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

@keyframes pulse{
0%{box-shadow:0 0 10px #22c55e}
50%{box-shadow:0 0 30px #22c55e}
100%{box-shadow:0 0 10px #22c55e}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes load{
from{width:0%}
to{width:100%}
}
</style>

</head>

<body>

<!-- Popunder -->
<script>(function(s){s.dataset.zone='10761776',s.src='https://al5sm.com/tag.min.js'})(document.body.appendChild(document.createElement('script')))</script>

<p>Play 1v1 & 2v2 Battles</p>

<div class="download-btn" onclick="handleDownload()">⬇ Download APK</div>
</div>

<div class="cards">
<div class="card">🎮 1v1 Battles</div>
<div class="card">👥 2v2 Matches</div>
<div class="card">💰 Cash Rewards</div>
<div class="card">⚡ Fast Withdraw</div>
</div>

<!-- LOADING SCREEN -->
<div id="loader">
<h2>Preparing Download...</h2>
<div class="loader-bar">
<div class="loader-fill"></div>
</div>
</div>

<footer>© 2026 HMR Gaming</footer>

<script>
let clicked = false;

function handleDownload(){
  if(!clicked){
    window.open("https://omg10.com/4/10761788","_blank");
    clicked = true;
    document.getElementById("loader").style.display="flex";

    setTimeout(()=>{
      document.getElementById("loader").style.display="none";
      alert("Click again to download APK 📥");
    },3000);

  } else {
    window.open("https://drive.google.com/uc?export=download&id=1qFRHtiRNvvkH-9vjtXe7hzY1asKjB_s0","_blank");
  }
}
</script>

</body>
</html>
