<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Fire Tournament App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* PARTICLES BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

.hero img{
width:130px;
border-radius:25px;
margin-bottom:20px;
animation:float 3s infinite ease-in-out;
}

.hero h1{
font-size:42px;
background:linear-gradient(90deg,#ff512f,#dd2476);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
opacity:0.8;
margin-top:10px;
}

/* BUTTON */

.download-btn{
display:inline-block;
margin-top:30px;
padding:16px 45px;
background:#22c55e;
border-radius:12px;
text-decoration:none;
color:white;
font-size:20px;
box-shadow:0 0 20px #22c55e;
transition:0.3s;
}

.download-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #22c55e;
}

/* SECTIONS */

.section{
padding:80px 20px;
text-align:center;
}

.cards{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
background:#334155;
}

/* RATING */

.stars{
font-size:28px;
color:gold;
margin-top:15px;
}

/* COUNTER */

.counter{
font-size:40px;
margin-top:10px;
color:#22c55e;
}

/* FOOTER */

footer{
padding:30px;
text-align:center;
background:#020617;
opacity:0.8;
}

/* ANIMATION */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div id="particles-js"></div>

<!-- HERO -->

<div class="hero">

<img src="https://i.ibb.co/G4GG9gnr/file-0000000049a871faa64aa6f3d4cae9c1.png">

<h1>Free Fire Tournament</h1>

<p>Play 1v1 & 2v2 Matches • Win Cash Rewards</p>

<a class="download-btn"
href="https://drive.google.com/uc?export=download&id=1qFRHtiRNvvkH-9vjtXe7hzY1asKjB_s0">

⬇ Download APK

</a>

</div>

<!-- FEATURES -->

<div class="section">

<h2>App Features</h2>

<div class="cards">

<div class="card">🎮 1v1 Tournament</div>

<div class="card">👥 2v2 Battles</div>

<div class="card">💰 Cash Rewards</div>

<div class="card">⚡ Fast Withdraw</div>

</div>

</div>

<!-- DOWNLOAD STATS -->

<div class="section">

<h2>Total Downloads</h2>

<div class="counter" id="counter">0</div>

</div>

<!-- RATING -->

<div class="section">

<h2>User Rating</h2>

<div class="stars">★★★★★</div>

<p>Rated 4.9 by players</p>

</div>

<footer>

© 2026 Free Fire Tournament App

</footer>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* PARTICLES */

particlesJS.load('particles-js',
'https://cdn.jsdelivr.net/particles.js/2.0.0/particles.json');

/* DOWNLOAD COUNTER */

let count = 0;
let target = 1250;

let counter = setInterval(()=>{

count += 5;

document.getElementById("counter").innerText = count + "+";

if(count >= target){
clearInterval(counter);
}

},20);

</script>

</body>
</html>
